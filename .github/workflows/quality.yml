name: Code Quality Checks

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  # Code quality checks for backend
  backend-quality:
    name: Backend Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --ext .js,.ts --max-warnings 0
        continue-on-error: false

      - name: Run Prettier check
        run: npx prettier --check "**/*.{js,ts,json,md}"
        continue-on-error: false

      - name: Run security audit
        run: npm audit --audit-level high
        continue-on-error: false

      - name: Check for vulnerable dependencies
        run: npx npm-check-updates --errorLevel 2
        continue-on-error: false

  # Code quality checks for frontend
  frontend-quality:
    name: Frontend Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: Run TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: false

      - name: Run Prettier check
        run: npx prettier --check "**/*.{ts,tsx,js,jsx,json,md}"
        continue-on-error: false

      - name: Check bundle size
        run: npx bundlesize
        continue-on-error: true
        env:
          BUNDLESIZE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run security audit
        run: npm audit --audit-level high
        continue-on-error: false

  # Code quality checks for mobile
  mobile-quality:
    name: Mobile Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.7.2"
          cache: true

      - name: Install dependencies
        working-directory: ./mobile
        run: flutter pub get

      - name: Run Flutter analyze
        working-directory: ./mobile
        run: flutter analyze --fatal-infos --fatal-warnings
        continue-on-error: false

      - name: Run Flutter format check
        working-directory: ./mobile
        run: flutter format --set-exit-if-changed lib/
        continue-on-error: false

      - name: Check pubspec.yaml format
        working-directory: ./mobile
        run: flutter format --set-exit-if-changed pubspec.yaml
        continue-on-error: false

  # # Code quality checks for blockchain
  # blockchain-quality:
  #   name: Blockchain Code Quality
  #   runs-on: ubuntu-latest
  #   defaults:
  #     run:
  #       working-directory: ./blockchain

  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #       with:
  #         fetch-depth: 0

  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: "18"
  #         cache: "npm"
  #         cache-dependency-path: blockchain/package-lock.json

  #     - name: Install dependencies
  #       run: npm ci

  #     - name: Run ESLint
  #       run: npx eslint . --ext .js --max-warnings 0
  #       continue-on-error: false

  #     - name: Run Prettier check
  #       run: npx prettier --check "**/*.{js,json,md}"
  #       continue-on-error: false

  #     - name: Run security audit
  #       run: npm audit --audit-level high
  #       continue-on-error: false

  # Documentation checks
  docs-quality:
    name: Documentation Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: markdownlint "**/*.md" --config .markdownlint.json
        continue-on-error: false

      - name: Check for broken links in docs
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          check-modified-files-only: "yes"
          config-file: ".mlc.config.json"

  # License and dependency checks
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install license-checker
        run: npm install -g license-checker

      - name: Check backend licenses
        working-directory: ./backend
        run: license-checker --production --failOn LGPL --failOn GPL --failOn AGPL
        continue-on-error: false

      - name: Check frontend licenses
        working-directory: ./frontend
        run: license-checker --production --failOn LGPL --failOn GPL --failOn AGPL
        continue-on-error: false

      - name: Check blockchain licenses
        working-directory: ./blockchain
        run: license-checker --production --failOn LGPL --failOn GPL --failOn AGPL
        continue-on-error: false

  # Performance and accessibility checks
  performance-check:
    name: Performance & Accessibility
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.12.x
          lhci autorun
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Summary report
  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs:
      [
        backend-quality,
        frontend-quality,
        mobile-quality,
        blockchain-quality,
        docs-quality,
        license-check,
        performance-check,
      ]
    if: always()

    steps:
      - name: Quality Gate Summary
        run: |
          echo "## Code Quality Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.backend-quality.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend-quality.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile | ${{ needs.mobile-quality.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Blockchain | ${{ needs.blockchain-quality.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.docs-quality.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License | ${{ needs.license-check.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance | ${{ needs.performance-check.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.backend-quality.result }}" == "failure" || \
                "${{ needs.frontend-quality.result }}" == "failure" || \
                "${{ needs.mobile-quality.result }}" == "failure" || \
                "${{ needs.blockchain-quality.result }}" == "failure" || \
                "${{ needs.docs-quality.result }}" == "failure" || \
                "${{ needs.license-check.result }}" == "failure" ]]; then
            echo "❌ **Quality Gate Failed** - Please fix the issues above before merging." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **Quality Gate Passed** - All checks successful!" >> $GITHUB_STEP_SUMMARY
          fi
