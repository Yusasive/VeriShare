name: Production Deployment

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      tag:
        description: "Release tag (optional)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build and push Docker images
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    outputs:
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event.inputs.environment == 'staging' || github.event_name == 'release'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Deploy backend to staging
        run: |
          sed -i 's|{{BACKEND_IMAGE}}|${{ needs.build-and-push.outputs.backend-image }}|g' k8s/staging/backend-deployment.yaml
          kubectl apply -f k8s/staging/backend-deployment.yaml
          kubectl apply -f k8s/staging/backend-service.yaml
          kubectl rollout status deployment/verishare-backend-staging

      - name: Deploy frontend to staging
        run: |
          sed -i 's|{{FRONTEND_IMAGE}}|${{ needs.build-and-push.outputs.frontend-image }}|g' k8s/staging/frontend-deployment.yaml
          kubectl apply -f k8s/staging/frontend-deployment.yaml
          kubectl apply -f k8s/staging/frontend-service.yaml
          kubectl rollout status deployment/verishare-frontend-staging

      - name: Run database migrations
        run: |
          kubectl exec -it $(kubectl get pods -l app=verishare-backend-staging -o jsonpath='{.items[0].metadata.name}') -- npm run migrate

      - name: Health check
        run: |
          sleep 30
          kubectl exec -it $(kubectl get pods -l app=verishare-backend-staging -o jsonpath='{.items[0].metadata.name}') -- curl -f http://localhost:5000/health
          kubectl exec -it $(kubectl get pods -l app=verishare-frontend-staging -o jsonpath='{.items[0].metadata.name}') -- curl -f http://localhost/health

  # Deploy to production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event.inputs.environment == 'production'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}

      - name: Deploy backend to production
        run: |
          sed -i 's|{{BACKEND_IMAGE}}|${{ needs.build-and-push.outputs.backend-image }}|g' k8s/production/backend-deployment.yaml
          kubectl apply -f k8s/production/backend-deployment.yaml
          kubectl apply -f k8s/production/backend-service.yaml
          kubectl rollout status deployment/verishare-backend-production --timeout=600s

      - name: Deploy frontend to production
        run: |
          sed -i 's|{{FRONTEND_IMAGE}}|${{ needs.build-and-push.outputs.frontend-image }}|g' k8s/production/frontend-deployment.yaml
          kubectl apply -f k8s/production/frontend-deployment.yaml
          kubectl apply -f k8s/production/frontend-service.yaml
          kubectl rollout status deployment/verishare-frontend-production --timeout=600s

      - name: Run database migrations
        run: |
          kubectl exec -it $(kubectl get pods -l app=verishare-backend-production -o jsonpath='{.items[0].metadata.name}') -- npm run migrate

      - name: Health check
        run: |
          sleep 60
          kubectl exec -it $(kubectl get pods -l app=verishare-backend-production -o jsonpath='{.items[0].metadata.name}') -- curl -f http://localhost:5000/health
          kubectl exec -it $(kubectl get pods -l app=verishare-frontend-production -o jsonpath='{.items[0].metadata.name}') -- curl -f http://localhost/health

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed, initiating rollback..."
          kubectl rollout undo deployment/verishare-backend-production
          kubectl rollout undo deployment/verishare-frontend-production
          kubectl rollout status deployment/verishare-backend-production
          kubectl rollout status deployment/verishare-frontend-production

  # Post-deployment notifications
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "VeriShare Deployment Completed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 VeriShare Deployment Status"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Environment:* ${{ github.event.inputs.environment || 'staging' }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Status:* ${{ needs.deploy-staging.result == 'success' && needs.deploy-production.result == 'success' && '✅ Success' || '❌ Failed' }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Triggered by:* ${{ github.actor }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.event.inputs.environment || 'staging' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ needs.deploy-staging.result == 'success' && needs.deploy-production.result == 'success' && '✅ Success' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend Image:** ${{ needs.build-and-push.outputs.backend-image }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Image:** ${{ needs.build-and-push.outputs.frontend-image }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
