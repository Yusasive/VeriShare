services:
  - type: web
    name: verishare-backend
    env: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET
        fromSecret: jwt-secret
      - key: DATABASE_URL
        fromSecret: mongodb-uri
      - key: ADMIN_ADDRESSES
        fromSecret: admin-addresses
      - key: IPFS_API_URL
        fromSecret: ipfs-api-url
      - key: IPFS_API_KEY
        fromSecret: ipfs-api-key
      - key: EVM_RPC_URL
        fromSecret: evm-rpc-url
      - key: EVM_PRIVATE_KEY
        fromSecret: evm-private-key
      - key: EVM_VERIFIER_ADDRESS
        fromSecret: evm-verifier-address
      - key: EVM_WALLETREG_ADDRESS
        fromSecret: evm-walletreg-address
      - key: EVM_REGISTRY_ADDRESS
        fromSecret: evm-registry-address
      - key: EVM_CONSENT_ADDRESS
        fromSecret: evm-consent-address
