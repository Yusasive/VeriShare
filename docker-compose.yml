version: "3.8"

services:
  # MongoDB Database
  mongodb:
    image: mongo:7-jammy
    container_name: verishare-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: verishare
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - verishare-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: verishare-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - verishare-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend API Gateway
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: verishare-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: mongodb://admin:password123@mongodb:27017/verishare?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-here
      BLOCKCHAIN_RPC_URL: http://blockchain:8545
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - verishare-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Organization Portal
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: verishare-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_GRAPHQL_URL: http://localhost:5000/graphql
      NEXTAUTH_SECRET: your-nextauth-secret
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - verishare-network

  # Blockchain Node (for development)
  blockchain:
    build:
      context: ./blockchain
      dockerfile: Dockerfile
    container_name: verishare-blockchain
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 8545
      NETWORK_ID: 1337
      GENESIS_BLOCK: '{"index":0,"timestamp":1609459200,"data":"Genesis Block","previousHash":"0","hash":"genesis-hash","nonce":0}'
    ports:
      - "8545:8545"
      - "8546:8546"
    volumes:
      - ./blockchain:/app
      - /app/node_modules
      - blockchain_data:/app/data
    networks:
      - verishare-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Mobile Development (optional - for testing APIs)
  # Uncomment if you want to run mobile development server
  # mobile:
  #   build:
  #     context: ./mobile
  #     dockerfile: Dockerfile
  #   container_name: verishare-mobile
  #   restart: unless-stopped
  #   ports:
  #     - "8080:8080"
  #   volumes:
  #     - ./mobile:/app
  #   depends_on:
  #     - backend
  #   networks:
  #     - verishare-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  blockchain_data:
    driver: local

networks:
  verishare-network:
    driver: bridge
